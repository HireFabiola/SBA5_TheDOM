<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA 5: The DOM</title>

    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Water+Brush&display=swap" rel="stylesheet">
</head>

<body class="container-fluid d-flex justify-content-center align-items-center vh-100">
    <div class="container-fluid">
        <div class="row w-100 p-5">
            <div class="col-1"></div>
            <div class="col-md-5 d-flex flex-column justify-content-center align-items-center">
                <img src="./images/images (1).png">

                <form id="blogPostForm" class="d-flex flex-column align-items-center w-100">
                    <div class="form-group mb-3">
                        <label for="blogTitle" class="form-label">Title</label>
                        <input type="text" id="username" name="username" class="form-control mb-3"
                            placeholder="Got a catchy title?" />
                    </div>

                    <div class="form-group mb-3">
                        <label for="blogDescription">Description</label>
                        <textarea name="blogDescription" id="blogDescription" class="form-control mb-3"
                            placeholder="Share a few notes about this blog post idea.  You can be as vague or as detailed as you wish.  This is intended to help you keep track of your ideas until you are ready to come back and develop fully for publication.  Have fun with it!"
                            rows="10"></textarea>
                    </div>

                   <button  type="button" id="submitBlogPost">
    Submit
</button>
                </form>

            </div>
            <div class="col-md-6 d-flex justify-content-center align-items-center">
                <h1 class="water-brush-regular">Let's Blog About It!</h1>
            </div>
        </div>
    </div>
</body>

</html>
