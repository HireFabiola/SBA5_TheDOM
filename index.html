<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA 5: The DOM</title>

    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Water+Brush&display=swap" rel="stylesheet">
</head>

<body class="container-fluid d-flex justify-content-center align-items-center" height="vh-100">
    <div class="container-fluid">
        <div class="row w-100 p-5">
            <div class="col-1"></div>
            <div class="col-2 d-flex flex-column justify-content-center align-items-center vh-100 ">
                <img src="./images/images (1).png">
                <form id="blogPostForm">
                    <input type="text" id="blogPostTitle" placeholder="Let's Give it a Title">
                    <span id="titleError"></span>
                    <textarea name="blogDescription" id="blogDescription"
                        placeholder="Share a few notes about this blog post idea" rows="10" cols="50"></textarea>
                </form>
            </div>
            <div class="col-md-9 d-flex justify-content-center align-items-center">
                <h1 class="water-brush-regular">Let's Blog About It!</h1>
            </div>
        </div>
    </div>
</body>

</html>
