<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA 5: The DOM</title>

    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Water+Brush&display=swap" rel="stylesheet">
</head>

<body class="container-fluid d-flex justify-content-center align-items-center" height="vh-100">
    <div class="container-fluid">
        <div class="row w-100 p-5">
            <div class="col-1"></div>
            <div class="col-2 d-flex flex-column justify-content-center align-items-center vh-100 ">
                <img src="./images/images (1).png">
                <form id="blogPostForm">
                    <div class="form-group">
                        <label for="blogTitle">
                            <h5>Title</h5>
                        </label>
                        <input type="text" id="username" name="username" placeholder="Got a catchy title?" />
                    </div>

                    <div class="form-group">
                        <label for="blogDescription">
                            <h5>Description</h5>
                        </label>
                        <textarea name="blogDescription" id="blogDescription" placeholder="Share a few notes about this blog post idea.  You can be as vague or as detailed as you wish.  This is intended to help you keep track of your ideas until you are ready to come back and develop fully for publication.  Have fun with it!" rows="10" cols="50"></textarea>
                    </div>
                
                    <button type="button" id="submitBlogPost">Submit</button>
                </form>
            </div>
            <div class="col-md-9 d-flex justify-content-center align-items-center">
                <h1 class="water-brush-regular">Let's Blog About It!</h1>
            </div>
        </div>
    </div>
</body>

</html>
